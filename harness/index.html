<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ether Game — harness</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f1c14;
        color: #d1fae5;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
      }
      header h1 {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: -0.02em;
      }
      header span {
        font-size: 0.75rem;
        opacity: 0.65;
      }
      #game-root {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Ether Game</h1>
        <span>Open-source harness — no wallet required</span>
      </header>
      <div id="game-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
