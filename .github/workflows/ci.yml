name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Unit checks
        run: npm run test:unit

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Start server
        working-directory: server
        run: |
          GAME_WS_SECRET=dev-test-secret node server.mjs &
          sleep 2
          curl -fsS http://127.0.0.1:8080/healthz
      - name: Integration suite
        run: GAME_WS_SECRET=dev-test-secret npm run verify:server

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install root + harness
        run: |
          npm install --ignore-scripts
          npm install --prefix harness --ignore-scripts
      - name: Typecheck
        run: npm run typecheck
