<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mobile HUD verify</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f1c14; color: #fff; }
    .game-hud-panel { background-color: rgba(9, 18, 14, 0.94) !important; }
    .game-hud-chip  { background-color: #14251d !important; }
    h2 { text-align: center; color: #a7f3d0; font-size: 13px; margin: 16px 0 8px; }
    #result { text-align: center; padding: 10px; font-weight: 700; font-size: 13px; }

    /* Simulates RESIZE: canvas fills host (no FIT letterbox) */
    .stage {
      position: relative;
      margin: 0 auto 24px;
      width: 390px;
      height: min(75dvh, 640px);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 16px;
      overflow: hidden;
      background: #1a2f1e;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 45% 40%, #4a8a5a 0%, #2a5a38 40%, #1a2f1e 100%);
    }

    .profile {
      position: absolute; left: 8px; top: 8px; width: 46%; max-width: 240px;
      border-radius: 12px; border: 1px solid rgba(52,211,153,0.35);
      padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .row { display: flex; align-items: center; gap: 6px; }
    .avatar {
      width: 28px; height: 28px; border-radius: 999px; background: #065f46;
      display: grid; place-items: center; font-size: 10px; font-weight: 800;
      ring: 2px solid rgba(52,211,153,0.5);
    }
    .lv { font-size: 10px; font-weight: 600; color: #6ee7b7; }
    .xp { flex: 1; height: 4px; background: #0a1510; border-radius: 999px; overflow: hidden; }
    .xp > i { display: block; width: 20%; height: 100%; background: linear-gradient(90deg,#10b981,#a3e635); }
    .icon {
      width: 24px; height: 24px; border-radius: 999px; display: grid; place-items: center;
      font-size: 8px; font-weight: 800; background: #064e3b; color: #a7f3d0;
      border: 1px solid rgba(52,211,153,0.35);
    }
    .icon.cesar { background: #fff; color: #111; }
    .bals { margin-top: 4px; font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-right {
      position: absolute; right: 8px; top: 8px; max-width: 48%;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    .top-right .pair { display: flex; align-items: flex-start; gap: 6px; }
    .clock {
      border-radius: 8px; border: 1px solid rgba(4,120,87,0.6);
      padding: 2px 6px; font: 700 10px/1 monospace; color: #ecfdf5;
    }
    .minimap { width: 48px; height: 48px; border-radius: 10px; background: #064e3b; border: 1px solid rgba(52,211,153,0.4); }
    .quest {
      border-radius: 12px; border: 1px solid rgba(251,191,36,0.4);
      padding: 6px 8px; width: auto; font-size: 10px; font-weight: 800;
      letter-spacing: 0.04em; text-transform: uppercase; color: #fde68a;
    }
    .hotbar {
      position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%);
      display: flex; gap: 4px;
    }
    .slot {
      width: 36px; height: 36px; border-radius: 12px;
      border: 1px solid rgba(52,211,153,0.3); display: grid; place-items: center; font-size: 11px;
    }
    .fab {
      position: fixed; bottom: 80px; right: 16px; width: 56px; height: 56px;
      border-radius: 999px; background: #fff; border: 1px solid #fecaca;
      display: none; /* hidden while liber-game-open */
      align-items: center; justify-content: center; color: #ef4444; font-weight: 800;
    }
  </style>
</head>
<body>
  <div id="result">Checking…</div>
  <h2>Mobile 390×75dvh — RESIZE fill + slim top (FAB hidden)</h2>
  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <div class="profile game-hud-panel">
      <div class="row">
        <div class="avatar">NE</div>
        <span class="lv">Lv 1</span>
        <div class="xp"><i></i></div>
        <span class="icon">LW</span>
        <span class="icon cesar">C</span>
      </div>
      <p class="bals">
        <span style="color:#34d399">SLETH</span> <span style="font-family:monospace">104.85</span>
        <span style="color:#6b7280"> · </span>
        <span style="color:#fcd34d">LETH</span> <span style="font-family:monospace">0.0071</span>
      </p>
    </div>
    <div class="top-right">
      <div class="pair">
        <div class="clock game-hud-chip">16:06</div>
        <div class="minimap"></div>
      </div>
      <div class="quest game-hud-panel">Quest Tracker ▾</div>
    </div>
    <div class="hotbar">
      <div class="slot game-hud-panel">I</div>
      <div class="slot game-hud-panel">C</div>
      <div class="slot game-hud-panel">Q</div>
      <div class="slot game-hud-panel">G</div>
      <div class="slot game-hud-panel">M</div>
      <div class="slot game-hud-panel">⚙</div>
    </div>
  </div>
  <div class="fab" id="fab">ETH</div>

  <script>
    document.documentElement.dataset.liberGameOpen = '1';
    const stage = document.getElementById('stage');
    const cv = document.getElementById('cv');
    const rect = stage.getBoundingClientRect();
    // RESIZE semantics: canvas pixel size matches host
    cv.width = Math.round(rect.width);
    cv.height = Math.round(rect.height);
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#3d7a4a';
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = '#8b7355';
    ctx.fillRect(cv.width * 0.2, cv.height * 0.35, cv.width * 0.6, cv.height * 0.35);

    const profile = stage.querySelector('.profile').getBoundingClientRect();
    const tr = stage.querySelector('.top-right').getBoundingClientRect();
    const canvasBox = cv.getBoundingClientRect();
    const overlap = !(profile.right <= tr.left || tr.right <= profile.left);
    const fillRatio = canvasBox.height / rect.height;
    const fabHidden = getComputedStyle(document.getElementById('fab')).display === 'none';
    const letterbox = fillRatio < 0.95;

    const ok = !overlap && !letterbox && fabHidden && profile.height < 90;
    document.getElementById('result').textContent =
      (ok ? 'PASS' : 'FAIL') +
      ' | canvas fill ' + Math.round(fillRatio * 100) + '%' +
      ' | profile h=' + Math.round(profile.height) + 'px' +
      (overlap ? ' | top overlap' : ' | top gap ' + Math.round(tr.left - profile.right) + 'px') +
      (fabHidden ? ' | FAB hidden' : ' | FAB visible');
    document.title = ok ? 'Mobile HUD PASS' : 'Mobile HUD FAIL';
  </script>
</body>
</html>
